services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: athara
      POSTGRES_USER: athara
      POSTGRES_PASSWORD: athara
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athara"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: athara
      MINIO_ROOT_PASSWORD: athara123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./services/api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: athara
      POSTGRES_USER: athara
      POSTGRES_PASSWORD: athara
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: athara
      MINIO_SECRET_KEY: athara123
      MINIO_BUCKET: athara
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./services/api:/app

  web:
    build: ./services/web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./services/web:/app
      - /app/node_modules

volumes:
  postgres_data:
  minio_data:
